<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña - Nutrisoft</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-gray-100">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Crea una nueva contraseña</h2>
            <p class="text-gray-500 text-sm mt-2">Asegúrate de que sea segura y fácil de recordar.</p>
        </div>

        <form action="{{ url_for('restablecer_password', token=token) }}" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Nueva Contraseña</label>
                <input type="password" name="password" required placeholder="••••••••" minlength="6"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition-all">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all">
                Guardar y entrar
            </button>
        </form>
    </div>
</body>
</html>
