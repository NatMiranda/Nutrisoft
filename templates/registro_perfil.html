<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Nutrisoft</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'gradient-x': 'gradient-x 10s ease infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': { 'background-position': '0% 50%' },
                            '50%': { 'background-position': '100% 50%' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .bg-animate { background-size: 400% 400%; }
    </style>
</head>
<body class="bg-gradient-to-br from-green-600 via-yellow-400 to-white bg-animate animate-gradient-x min-h-screen flex items-center justify-center px-4 py-8">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-green-700">Crea tu cuenta</h2>
            <p class="text-gray-500 mt-2">Únete a Nutrisoft y empieza a transformar tu vida hoy.</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="bg-red-50 border-l-4 border-red-400 text-red-700 p-4 mb-6 rounded-r-lg text-sm">
              {% for message in messages %}
                <p class="font-medium">⚠️ {{ message }}</p>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form action="/guardar_registro" method="POST" class="space-y-5">
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Nombre Completo</label>
                <input type="text" name="nombre" placeholder="¿Cómo te llamas?" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Correo Electrónico</label>
                <input type="email" name="correo" placeholder="ejemplo@correo.com" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Contraseña</label>
                <input type="password" name="password" placeholder="••••••••" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all">
            </div>

            <button type="submit" 
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-extrabold py-3.5 rounded-xl shadow-lg shadow-green-100 transition-all transform hover:scale-[1.02] active:scale-95">
                Comenzar ahora
            </button>

        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-gray-500 text-sm mb-2">¿Ya tienes una cuenta?</p>
            <a href="/" class="inline-block text-green-600 font-bold hover:text-green-700 transition-colors">
                Inicia sesión aquí
            </a>
        </div>

    </div>

</body>
</html>
