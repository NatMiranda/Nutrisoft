<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Perfil - Nutrisoft</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'gradient-x': 'gradient-x 10s ease infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': { 'background-position': '0% 50%' },
                            '50%': { 'background-position': '100% 50%' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .bg-animate { background-size: 400% 400%; }
    </style>
</head>
<body class="bg-gradient-to-br from-green-600 via-yellow-400 to-white bg-animate animate-gradient-x h-screen flex items-center justify-center px-4">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-green-700">Editar mis datos</h2>
            <p class="text-gray-500 text-sm mt-2">Mantén tu información actualizada para cálculos precisos.</p>
        </div>

        <form action="/actualizar_perfil" method="POST" class="space-y-6">
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Nombre Completo</label>
                <input type="text" name="nombre" value="{{ usuario.nombre }}" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Estatura (en centímetros)</label>
                <div class="relative">
                    <input type="number" name="estatura" 
                           value="{% if usuario.estatura_cm %}{{ (usuario.estatura_cm * 100)|int }}{% endif %}" 
                           placeholder="Ej: 175" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all">
                    <span class="absolute right-4 top-3.5 text-gray-400 font-bold">cm</span>
                </div>
                <p class="text-[10px] text-gray-400 mt-1 italic">Ejemplo: Si mides 1.75m, escribe 175.</p>
            </div>

            <div class="flex flex-col gap-3 pt-4">
                <button type="submit" 
                        class="w-full bg-green-600 hover:bg-green-700 text-white font-extrabold py-3 rounded-xl shadow-lg shadow-green-100 transition-all transform hover:scale-[1.02] active:scale-95">
                    Guardar Cambios
                </button>
                
                <a href="/panel" 
                   class="w-full text-center py-3 text-gray-500 font-bold hover:text-gray-700 transition-colors">
                    Cancelar y volver
                </a>
            </div>

        </form>

    </div>

</body>
</html>
